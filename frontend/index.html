<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TeleStore — File Directory</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0a0a0f;
      --surface: #111118;
      --border: rgba(255,255,255,0.07);
      --accent: #5b6ef5;
      --accent2: #8b5cf6;
      --green: #22d3a5;
      --red: #f87171;
      --text: #e8e8f0;
      --muted: #6b6b80;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'Syne', sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* Animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(91,110,245,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(91,110,245,0.04) 1px, transparent 1px);
      background-size: 48px 48px;
      z-index: 0;
      pointer-events: none;
    }

    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.15;
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 500px; height: 500px; background: var(--accent); top: -100px; left: -100px; animation: drift 12s ease-in-out infinite alternate; }
    .blob-2 { width: 400px; height: 400px; background: var(--accent2); bottom: -100px; right: -100px; animation: drift 15s ease-in-out infinite alternate-reverse; }

    @keyframes drift {
      from { transform: translate(0,0) scale(1); }
      to { transform: translate(40px, 30px) scale(1.1); }
    }

    .wrapper {
      position: relative;
      z-index: 1;
      max-width: 780px;
      margin: 0 auto;
      padding: 48px 24px 80px;
    }

    header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 50px; }
    
    .logo { display: flex; align-items: center; gap: 12px; }
    .logo-icon { width: 40px; height: 40px; background: linear-gradient(135deg, var(--accent), var(--accent2)); border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; }
    .logo-text { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; }
    .logo-text span { color: var(--accent); }

    /* URLKING Promo Card */
    .promo-card {
      background: rgba(17, 17, 24, 0.6);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(91,110,245,0.3);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      margin-bottom: 40px;
      box-shadow: 0 0 30px rgba(91,110,245,0.1);
      position: relative;
      overflow: hidden;
    }

    .promo-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; width: 100%; height: 4px;
      background: linear-gradient(90deg, var(--accent), var(--accent2));
    }

    .promo-card h2 {
      font-size: 28px;
      font-weight: 800;
      margin-bottom: 12px;
      background: linear-gradient(90deg, #fff, #a5b4fc);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .promo-card p {
      color: var(--muted);
      font-family: 'DM Mono', monospace;
      font-size: 14px;
      margin-bottom: 24px;
      line-height: 1.6;
    }

    .btn-register {
      display: inline-block;
      padding: 14px 32px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: white;
      text-decoration: none;
      font-weight: 700;
      border-radius: 12px;
      transition: all 0.3s;
      letter-spacing: 0.5px;
      box-shadow: 0 8px 20px rgba(91,110,245,0.3);
    }
    .btn-register:hover { transform: translateY(-2px); box-shadow: 0 12px 25px rgba(91,110,245,0.5); }

    /* Auth Card */
    .auth-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 20px;
      padding: 40px;
      text-align: center;
      margin-bottom: 40px;
    }

    .auth-card h3 { margin-bottom: 20px; font-size: 20px; }
    
    .auth-input {
      width: 100%;
      max-width: 300px;
      padding: 14px 16px;
      background: rgba(255,255,255,0.03);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Mono', monospace;
      margin-bottom: 16px;
      outline: none;
      transition: border-color 0.2s;
    }
    .auth-input:focus { border-color: var(--accent); }

    .btn-login {
      padding: 14px 32px;
      background: rgba(91,110,245,0.15);
      border: 1px solid rgba(91,110,245,0.3);
      color: var(--accent);
      font-family: 'Syne', sans-serif;
      font-size: 14px;
      font-weight: 700;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.2s;
    }
    .btn-login:hover { background: rgba(91,110,245,0.25); }
    
    .error-msg {
      color: var(--red);
      font-family: 'DM Mono', monospace;
      font-size: 12px;
      margin-top: 12px;
      display: none;
    }

    /* Files Section (Hidden by default) */
    .files-section { display: none; }
    .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 20px; }
    .section-title { font-size: 18px; font-weight: 700; }
    .badge { font-family: 'DM Mono', monospace; font-size: 11px; background: rgba(91,110,245,0.12); color: var(--accent); padding: 4px 10px; border-radius: 100px; border: 1px solid rgba(91,110,245,0.2); }

    .file-row {
      display: flex; align-items: center; gap: 14px; padding: 16px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 12px; margin-bottom: 10px;
      transition: border-color 0.2s, transform 0.15s;
    }
    .file-row:hover { border-color: rgba(91,110,245,0.2); transform: translateX(2px); }
    .file-row-icon { font-size: 22px; width: 36px; text-align: center; flex-shrink: 0; }
    .file-row-info { flex: 1; min-width: 0; }
    .file-row-name { font-size: 14px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .file-row-meta { font-family: 'DM Mono', monospace; font-size: 11px; color: var(--muted); margin-top: 2px; }

    .btn-dl {
      background: rgba(34,211,165,0.1); border: 1px solid rgba(34,211,165,0.25);
      color: var(--green); font-family: 'Syne', sans-serif; font-size: 12px;
      font-weight: 600; padding: 8px 14px; border-radius: 8px; cursor: pointer;
      text-decoration: none; transition: all 0.2s; white-space: nowrap;
    }
    .btn-dl:hover { background: rgba(34,211,165,0.18); }

    .empty { text-align: center; padding: 40px; color: var(--muted); font-family: 'DM Mono', monospace; font-size: 13px; }

    /* Pagination */
    .pagination { display: flex; justify-content: center; align-items: center; gap: 16px; margin-top: 30px; }
    .btn-page { background: var(--surface); border: 1px solid var(--border); color: var(--text); padding: 8px 16px; border-radius: 8px; cursor: pointer; font-family: 'Syne', sans-serif; font-weight: 600; transition: all 0.2s; }
    .btn-page:hover:not(:disabled) { border-color: var(--accent); color: var(--accent); }
    .btn-page:disabled { opacity: 0.4; cursor: not-allowed; }
    .page-info { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--muted); }
  </style>
</head>
<body>

<div class="blob blob-1"></div>
<div class="blob blob-2"></div>

<div class="wrapper">
  <header>
    <div class="logo">
      <div class="logo-icon">📡</div>
      <div class="logo-text">Tele<span>Store</span></div>
    </div>
  </header>

  <div class="promo-card">
    <h2>Upload & Monetize Your Files</h2>
    <p>Want to upload files up to 2GB for free and earn money with URL shorteners? <br> Join the ultimate platform for creators.</p>
    <a href="https://urlking.site/" class="btn-register" target="_blank">Register on URLKING Brand →</a>
  </div>

  <div class="auth-card" id="authSection">
    <h3>Admin Access</h3>
    <input type="password" id="adminPassword" class="auth-input" placeholder="Enter Secret Key" onkeypress="handleEnter(event)" />
    <br>
    <button class="btn-login" onclick="verifyLogin()">View Files</button>
    <div class="error-msg" id="authError">⚠ Invalid password. Access denied.</div>
  </div>

  <div class="files-section" id="filesSection">
    <div class="section-header">
      <div class="section-title">Directory</div>
      <div style="display: flex; gap: 10px; align-items: center;">
        <div class="badge" id="fileCount">0 files</div>
        <button onclick="logout()" style="background: none; border: none; color: var(--red); font-size: 12px; cursor: pointer; text-decoration: underline;">Logout</button>
      </div>
    </div>
    <div id="filesList">
      <div class="empty">Loading files...</div>
    </div>
    
    <div class="pagination" id="paginationControls" style="display: none;">
      <button class="btn-page" id="btnPrev" onclick="changePage(-1)">← Prev</button>
      <div class="page-info">Page <span id="currentPage">1</span> of <span id="totalPages">1</span></div>
      <button class="btn-page" id="btnNext" onclick="changePage(1)">Next →</button>
    </div>
  </div>
</div>

<script>
  // CONFIG
  const API_BASE = ''; 
  let currentPage = 1;
  const limitPerPage = 10;
  let totalPages = 1;
  let secretKey = localStorage.getItem('telestore_key') || '';

  function getFileIcon(filename) {
    if (!filename) return '📄';
    const ext = filename.split('.').pop().toLowerCase();
    const map = {
      pdf: '📕', doc: '📝', docx: '📝', txt: '📄', md: '📋',
      jpg: '🖼️', jpeg: '🖼️', png: '🖼️', gif: '🎞️', webp: '🖼️', svg: '🎨',
      mp4: '🎬', mov: '🎬', avi: '🎬', mkv: '🎬', webm: '🎬',
      mp3: '🎵', wav: '🎵', zip: '📦', rar: '📦', apk: '📱', exe: '⚙️',
    };
    return map[ext] || '📄';
  }

  function handleEnter(e) {
    if (e.key === 'Enter') verifyLogin();
  }

  function verifyLogin() {
    const inputKey = document.getElementById('adminPassword').value;
    if (!inputKey) return;
    secretKey = inputKey;
    localStorage.setItem('telestore_key', secretKey);
    document.getElementById('authError').style.display = 'none';
    loadFiles(1);
  }

  function logout() {
    secretKey = '';
    localStorage.removeItem('telestore_key');
    document.getElementById('adminPassword').value = '';
    document.getElementById('filesSection').style.display = 'none';
    document.getElementById('authSection').style.display = 'block';
  }

  async function loadFiles(page = 1) {
    if (!secretKey) return; // Don't load if no key

    try {
      const resp = await fetch(`${API_BASE}/files?page=${page}&limit=${limitPerPage}&key=${encodeURIComponent(secretKey)}`);
      
      if (resp.status === 403) {
        document.getElementById('authError').style.display = 'block';
        localStorage.removeItem('telestore_key');
        secretKey = '';
        return;
      }

      if (!resp.ok) throw new Error("Server error");

      const data = await resp.json();
      
      // Setup UI for success
      document.getElementById('authSection').style.display = 'none';
      document.getElementById('filesSection').style.display = 'block';
      
      currentPage = data.page;
      totalPages = data.total_pages;

      document.getElementById('fileCount').textContent = `${data.total} file${data.total !== 1 ? 's' : ''}`;
      
      const list = document.getElementById('filesList');
      if (data.files.length === 0) {
        list.innerHTML = '<div class="empty">No files available.</div>';
        document.getElementById('paginationControls').style.display = 'none';
      } else {
        list.innerHTML = data.files.map(f => `
          <div class="file-row">
            <div class="file-row-icon">${getFileIcon(f.filename)}</div>
            <div class="file-row-info">
              <div class="file-row-name">${f.filename}</div>
              <div class="file-row-meta">${f.size} · #${f.short_id}</div>
            </div>
            <a class="btn-dl" href="${f.download_link}" target="_blank">Download</a>
          </div>
        `).join('');
        
        // Update Pagination UI
        document.getElementById('paginationControls').style.display = 'flex';
        document.getElementById('currentPage').textContent = currentPage;
        document.getElementById('totalPages').textContent = totalPages;
        
        document.getElementById('btnPrev').disabled = (currentPage <= 1);
        document.getElementById('btnNext').disabled = (currentPage >= totalPages);
      }
    } catch (e) {
      document.getElementById('authError').textContent = '⚠ Backend offline or error.';
      document.getElementById('authError').style.display = 'block';
    }
  }

  function changePage(direction) {
    let newPage = currentPage + direction;
    if (newPage >= 1 && newPage <= totalPages) {
      loadFiles(newPage);
      window.scrollTo({ top: document.getElementById('filesSection').getBoundingClientRect().top + window.scrollY - 20, behavior: 'smooth' });
    }
  }

  // Initial check if key exists in local storage
  if (secretKey) {
    loadFiles(currentPage);
  }
</script>
</body>
</html>
