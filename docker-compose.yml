version: "3.8"

services:
  telestore:
    build: .
    ports:
      - "9500:9500"
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - CHANNEL_ID=${CHANNEL_ID}
      - BASE_URL=${BASE_URL:-http://localhost:9500}
      - API_ID=${API_ID}
      - API_HASH=${API_HASH}
      - PORT=${PORT:-9500}
    volumes:
      - telestore-data:/app/data
    restart: unless-stopped
    labels:
      - "traefik.enable=true"

      # Gzip compression band karo — yahi Content-Length destroy karta tha
      - "traefik.http.middlewares.telestore-nogzip.compress=false"

      # Buffering band karo — direct stream hoga
      - "traefik.http.middlewares.telestore-buffer.buffering.maxResponseBodyBytes=0"

      # Custom response headers
      - "traefik.http.middlewares.telestore-headers.headers.customResponseHeaders.X-Accel-Buffering=no"
      - "traefik.http.middlewares.telestore-headers.headers.customResponseHeaders.Accept-Ranges=bytes"

      # Sabhi middlewares ek saath apply karo
      - "traefik.http.routers.telestore.middlewares=telestore-nogzip,telestore-headers"

volumes:
  telestore-data:
